version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: woodix-postgres
    environment:
      POSTGRES_USER: woodix_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: woodix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - woodix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woodix_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: woodix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - woodix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: woodix-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@woodix.uz
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - woodix-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  woodix-network:
    driver: bridge
